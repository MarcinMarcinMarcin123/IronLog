<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IronLog</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inconsolata:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0c0e0f;
  --s1: #111416;
  --s2: #181c1f;
  --s3: #202428;
  --s4: #282d32;
  --border: #2a2f34;
  --border2: #3a4048;
  --accent: #c8ff4d;
  --accent-dim: rgba(200,255,77,0.08);
  --red: #ff5555;
  --red-dim: rgba(255,85,85,0.1);
  --blue: #5aabff;
  --blue-dim: rgba(90,171,255,0.1);
  --green: #3ddc84;
  --green-dim: rgba(61,220,132,0.1);
  --text: #dde1e4;
  --t2: #7a8490;
  --t3: #464f57;
  --r: 10px;
  --rl: 14px;
}
html { height: 100%; }
body { background:var(--bg); color:var(--text); font-family:'Syne',sans-serif; height:100%; overflow:hidden; }

/* ─── APP SHELL ─── */
.app { display:flex; height:100%; }

/* ─── LEFT SIDEBAR ─── */
.sidebar {
  width:260px; min-width:260px;
  background:var(--s1);
  border-right:1px solid var(--border);
  display:flex; flex-direction:column;
  overflow:hidden;
}
.logo { padding:22px 20px 16px; border-bottom:1px solid var(--border); flex-shrink:0; }
.logo-mark { font-size:1.4rem; font-weight:800; color:var(--accent); letter-spacing:-0.5px; }
.logo-sub { font-family:'Inconsolata',monospace; font-size:0.6rem; color:var(--t3); letter-spacing:3px; margin-top:2px; }

/* TAB SWITCHER */
.tab-row {
  display:flex; border-bottom:1px solid var(--border); flex-shrink:0;
}
.tab {
  flex:1; padding:11px 6px; text-align:center;
  font-size:0.7rem; font-weight:700; letter-spacing:1.5px;
  color:var(--t3); cursor:pointer; transition:all 0.15s;
  border-bottom:2px solid transparent; margin-bottom:-1px;
  font-family:'Inconsolata',monospace;
}
.tab:hover { color:var(--t2); }
.tab.active { color:var(--accent); border-bottom-color:var(--accent); }

/* SIDEBAR CONTENT */
.sidebar-pane { flex:1; overflow-y:auto; padding:14px; display:none; }
.sidebar-pane.active { display:block; }

/* PLANS LIBRARY */
.plan-item {
  display:flex; align-items:center; gap:10px;
  padding:10px 11px;
  background:var(--s2); border:1px solid var(--border);
  border-radius:var(--r); margin-bottom:6px; cursor:pointer;
  transition:all 0.15s; user-select:none;
}
.plan-item:hover { border-color:var(--border2); }
.plan-item.selected { border-color:var(--accent); background:var(--accent-dim); }
.plan-dot { width:8px; height:8px; border-radius:50%; background:var(--blue); flex-shrink:0; }
.plan-item-name { flex:1; font-size:0.85rem; font-weight:700; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.plan-item-count { font-family:'Inconsolata',monospace; font-size:0.7rem; color:var(--t3); }

.new-plan-btn {
  width:100%; background:transparent; border:1px dashed var(--border);
  border-radius:var(--r); padding:10px; color:var(--t3);
  font-family:'Syne',sans-serif; font-size:0.78rem; font-weight:700;
  cursor:pointer; transition:all 0.15s;
  display:flex; align-items:center; justify-content:center; gap:7px;
  margin-top:4px;
}
.new-plan-btn:hover { border-color:var(--accent); color:var(--accent); }

/* CALENDAR */
.cal-nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.cal-month-lbl { font-weight:700; font-size:0.9rem; }
.cal-arr {
  background:var(--s2); border:1px solid var(--border); border-radius:7px;
  width:26px; height:26px; color:var(--t2); cursor:pointer; font-size:0.85rem;
  display:flex; align-items:center; justify-content:center; transition:all 0.15s;
}
.cal-arr:hover { border-color:var(--accent); color:var(--accent); }
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:2px; }
.cal-dow { font-family:'Inconsolata',monospace; font-size:0.58rem; color:var(--t3); text-align:center; padding:3px 0 5px; }
.cal-day {
  aspect-ratio:1; border-radius:6px;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  cursor:pointer; font-size:0.75rem; font-weight:600; color:var(--t2);
  transition:all 0.12s; position:relative; gap:2px;
}
.cal-day:hover { background:var(--s2); color:var(--text); }
.cal-day.today { color:var(--accent); }
.cal-day.has-plan { color:var(--text); }
.cal-day.selected { background:var(--accent); color:#000; }
.cal-day.other-month { opacity:0.3; }
.plan-pips { display:flex; gap:2px; position:absolute; bottom:3px; }
.plan-pip { width:4px; height:4px; border-radius:50%; background:var(--blue); }
.cal-day.selected .plan-pips { display:none; }
.cal-day.today:not(.selected)::after {
  content:''; width:3px; height:3px; border-radius:50%;
  background:var(--accent); position:absolute; bottom:3px;
}
.cal-day.has-plan.today:not(.selected)::after { display:none; }

/* ─── MAIN AREA ─── */
.main { flex:1; display:flex; flex-direction:column; overflow:hidden; }

.topbar {
  background:var(--s1); border-bottom:1px solid var(--border);
  padding:18px 28px; display:flex; align-items:center; justify-content:space-between;
  flex-shrink:0;
}
.topbar-left { display:flex; flex-direction:column; gap:3px; }
.topbar-date { font-family:'Inconsolata',monospace; font-size:0.65rem; color:var(--t3); letter-spacing:2px; }
.topbar-title { font-size:1.2rem; font-weight:800; letter-spacing:-0.3px; line-height:1.2; }
.topbar-badge {
  display:inline-flex; align-items:center; gap:5px;
  background:var(--blue-dim); color:var(--blue);
  border:1px solid rgba(90,171,255,0.2);
  border-radius:5px; padding:2px 8px;
  font-family:'Inconsolata',monospace; font-size:0.6rem; letter-spacing:2px;
  margin-top:3px; width:fit-content;
}

.btn {
  display:inline-flex; align-items:center; gap:6px;
  padding:8px 15px; border-radius:var(--r);
  font-family:'Syne',sans-serif; font-size:0.78rem; font-weight:700;
  cursor:pointer; transition:all 0.15s; white-space:nowrap;
}
.btn svg { width:14px; height:14px; }
.btn-accent { background:var(--accent); color:#000; border:none; }
.btn-accent:hover { background:#d8ff6a; transform:translateY(-1px); }
.btn-ghost { background:transparent; color:var(--t2); border:1px solid var(--border); }
.btn-ghost:hover { border-color:var(--border2); color:var(--text); }
.btn-red { background:var(--red-dim); color:var(--red); border:1px solid rgba(255,85,85,0.2); }
.btn-red:hover { background:rgba(255,85,85,0.2); }

/* CONTENT */
.content { flex:1; overflow-y:auto; padding:24px 28px; }

/* EMPTY */
.empty {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  min-height:360px; gap:14px; text-align:center;
}
.empty-icon {
  width:58px; height:58px; background:var(--s2); border:1px solid var(--border);
  border-radius:18px; display:flex; align-items:center; justify-content:center; color:var(--t3);
}
.empty-title { font-size:1rem; font-weight:700; color:var(--t2); }
.empty-sub { font-size:0.82rem; color:var(--t3); max-width:260px; line-height:1.6; }

/* PROGRESS */
.prog-bar-wrap {
  background:var(--s2); border:1px solid var(--border); border-radius:var(--rl);
  padding:15px 20px; margin-bottom:20px;
  display:flex; align-items:center; gap:24px;
}
.stats-row { display:flex; gap:20px; }
.stat { display:flex; flex-direction:column; gap:2px; }
.stat-v { font-family:'Inconsolata',monospace; font-size:1.3rem; color:var(--accent); line-height:1; }
.stat-l { font-family:'Inconsolata',monospace; font-size:0.6rem; letter-spacing:2px; color:var(--t3); }
.prog-track { height:5px; background:var(--s4); border-radius:3px; overflow:hidden; flex:1; }
.prog-fill { height:100%; background:var(--accent); border-radius:3px; transition:width 0.3s; }
.prog-pct { font-family:'Inconsolata',monospace; font-size:0.65rem; color:var(--t3); margin-top:4px; text-align:right; }

/* ─── EXERCISE CARD ─── */
.ex-card {
  background:var(--s1); border:1px solid var(--border); border-radius:var(--rl);
  margin-bottom:12px; overflow:hidden; animation:fadeUp 0.18s ease;
  transition:border-color 0.2s;
}
@keyframes fadeUp { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:translateY(0); } }
.ex-card.done { border-color:var(--green); }

.ex-top {
  display:flex; align-items:center; gap:10px; padding:14px 16px;
}
.chk {
  width:22px; height:22px; border-radius:6px; border:2px solid var(--border2);
  flex-shrink:0; display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:all 0.15s;
}
.chk:hover { border-color:var(--green); }
.chk.on { background:var(--green); border-color:var(--green); }
.chk svg { display:none; }
.chk.on svg { display:block; }

.ex-name-inp {
  flex:1; background:transparent; border:none; color:var(--text);
  font-family:'Syne',sans-serif; font-size:0.95rem; font-weight:700; outline:none;
}
.ex-name-inp::placeholder { color:var(--t3); }
.ex-name-inp.strike { text-decoration:line-through; color:var(--green); opacity:0.6; }

.icon-btn {
  background:transparent; border:none; color:var(--t3); cursor:pointer;
  padding:4px; border-radius:6px; transition:all 0.15s; display:flex; align-items:center;
}
.icon-btn:hover { color:var(--text); }
.icon-btn.del:hover { color:var(--red); }
.icon-btn svg { width:15px; height:15px; }
.icon-btn.expand svg { transition:transform 0.2s; }
.icon-btn.expand.open svg { transform:rotate(180deg); }

.ex-body {
  border-top:1px solid var(--border); padding:16px; display:none;
}
.ex-body.open { display:block; }

/* SETS */
.sec-lbl { font-family:'Inconsolata',monospace; font-size:0.6rem; letter-spacing:3px; color:var(--t3); margin-bottom:9px; }
table.sets { width:100%; border-collapse:collapse; margin-bottom:7px; }
table.sets th { font-family:'Inconsolata',monospace; font-size:0.58rem; letter-spacing:2px; color:var(--t3); text-align:left; padding:0 5px 7px; }
table.sets td { padding:3px 3px; }
.si {
  background:var(--s2); border:1px solid var(--border); border-radius:6px;
  padding:7px 9px; color:var(--text); font-family:'Inconsolata',monospace; font-size:0.82rem;
  width:100%; outline:none; transition:border-color 0.15s; text-align:center;
}
.si:focus { border-color:var(--accent); }
.si::placeholder { color:var(--t3); }
.si.num { width:32px; opacity:0.35; pointer-events:none; }
.rm-set { background:transparent; border:none; color:var(--t3); cursor:pointer; padding:3px 7px; border-radius:5px; font-size:1rem; transition:color 0.15s; }
.rm-set:hover { color:var(--red); }
.add-set {
  background:transparent; border:1px dashed var(--border); border-radius:6px;
  padding:5px 12px; color:var(--t3); font-family:'Syne',sans-serif; font-size:0.72rem; font-weight:700;
  cursor:pointer; transition:all 0.15s;
}
.add-set:hover { border-color:var(--accent); color:var(--accent); }

/* LINK */
.link-wrap { display:flex; gap:6px; align-items:center; margin-top:10px; }
.link-inp {
  flex:1; background:var(--s2); border:1px solid var(--border); border-radius:7px;
  padding:8px 11px; color:var(--text); font-family:'Inconsolata',monospace; font-size:0.75rem;
  outline:none; transition:border-color 0.15s;
}
.link-inp:focus { border-color:var(--accent); }
.link-inp::placeholder { color:var(--t3); }
.link-go {
  background:var(--s3); border:1px solid var(--border); border-radius:7px;
  padding:7px 9px; color:var(--t3); cursor:pointer; display:flex; align-items:center;
  transition:all 0.15s; flex-shrink:0;
}
.link-go:hover { color:var(--accent); border-color:var(--accent); }
.link-go svg { width:13px; height:13px; }

/* ALT EXERCISE */
.alt-box { margin-top:14px; background:var(--s2); border:1px solid var(--border); border-radius:var(--r); overflow:hidden; }
.alt-toggle {
  display:flex; align-items:center; gap:9px; padding:11px 13px;
  cursor:pointer; user-select:none; transition:background 0.15s;
}
.alt-toggle:hover { background:var(--s3); }
.alt-badge {
  background:var(--blue-dim); color:var(--blue); border:1px solid rgba(90,171,255,0.2);
  border-radius:4px; padding:1px 7px; font-family:'Inconsolata',monospace; font-size:0.58rem; letter-spacing:2px;
}
.alt-name-lbl { font-size:0.8rem; font-weight:700; flex:1; color:var(--t2); }
.alt-chv { color:var(--t3); transition:transform 0.2s; }
.alt-chv.open { transform:rotate(180deg); }
.alt-inner { border-top:1px solid var(--border); padding:13px; display:none; }
.alt-inner.open { display:block; }
.field-lbl { font-family:'Inconsolata',monospace; font-size:0.58rem; letter-spacing:2px; color:var(--t3); margin-bottom:5px; }
.text-inp {
  width:100%; background:var(--s3); border:1px solid var(--border); border-radius:7px;
  padding:9px 12px; color:var(--text); font-family:'Syne',sans-serif; font-size:0.88rem; font-weight:700;
  outline:none; transition:border-color 0.15s; margin-bottom:12px;
}
.text-inp:focus { border-color:var(--blue); }
.text-inp::placeholder { color:var(--t3); }

/* ADD EX */
.add-ex {
  width:100%; background:transparent; border:1px dashed var(--border);
  border-radius:var(--rl); padding:13px; color:var(--t3);
  font-family:'Syne',sans-serif; font-size:0.82rem; font-weight:700;
  cursor:pointer; transition:all 0.15s;
  display:flex; align-items:center; justify-content:center; gap:7px;
}
.add-ex:hover { border-color:var(--accent); color:var(--accent); }
.add-ex svg { width:15px; height:15px; }

/* ─── ASSIGN PANEL (appears when cal day selected) ─── */
.assign-panel {
  background:var(--s2); border:1px solid var(--border); border-radius:var(--rl);
  padding:16px; margin-bottom:20px;
}
.assign-title { font-size:0.75rem; font-weight:700; color:var(--t2); margin-bottom:10px; letter-spacing:0.5px; }
.assign-plans { display:flex; flex-wrap:wrap; gap:7px; margin-bottom:10px; }
.assign-chip {
  background:var(--s3); border:1px solid var(--border); border-radius:7px;
  padding:6px 12px; font-size:0.78rem; font-weight:700; cursor:pointer; transition:all 0.15s;
}
.assign-chip:hover { border-color:var(--accent); color:var(--accent); }
.assign-chip.active-chip { background:var(--accent); color:#000; border-color:var(--accent); }
.assign-none { font-size:0.78rem; color:var(--t3); padding:4px 0; }

/* ─── MODALS ─── */
.overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.75);
  z-index:300; display:flex; align-items:center; justify-content:center;
  backdrop-filter:blur(4px); opacity:0; pointer-events:none; transition:opacity 0.18s;
}
.overlay.open { opacity:1; pointer-events:all; }
.modal {
  background:var(--s1); border:1px solid var(--border2); border-radius:var(--rl);
  padding:26px; width:420px; max-width:90vw;
  transform:translateY(8px); transition:transform 0.18s;
}
.overlay.open .modal { transform:translateY(0); }
.modal-title { font-size:1.05rem; font-weight:800; margin-bottom:5px; }
.modal-sub { font-size:0.78rem; color:var(--t3); margin-bottom:18px; line-height:1.5; }
.modal-inp {
  width:100%; background:var(--s2); border:1px solid var(--border); border-radius:8px;
  padding:10px 13px; color:var(--text); font-family:'Syne',sans-serif; font-size:0.92rem; font-weight:700;
  outline:none; transition:border-color 0.15s; margin-bottom:14px;
}
.modal-inp:focus { border-color:var(--accent); }
.modal-btns { display:flex; gap:9px; justify-content:flex-end; }

/* SCROLLBAR */
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

/* ─── RESPONSIVE ─── */

/* Always prevent flex title from blowing out */
.topbar-left { min-width: 0; flex: 1; }
.topbar-title { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* TABLET */
@media(max-width:900px) {
  .sidebar { width: 220px; min-width: 220px; }
  .topbar { padding: 14px 18px; gap: 10px; }
  .content { padding: 18px; }
  .btn { padding: 7px 11px; font-size: 0.73rem; }
}

/* ── MOBILE ─────────────────────────────────────────
   Key fix: on mobile the app becomes a normal vertical
   page. No height:100vh, no overflow:hidden anywhere.
   Sidebar sits at top, content scrolls below it.
─────────────────────────────────────────────────── */
@media(max-width:640px) {

  /* Let the whole page scroll naturally */
  html, body { height: auto; overflow: auto; }

  .app {
    flex-direction: column;
    height: auto;
    min-height: 100svh; /* safe-area aware */
  }

  /* ── Sidebar: compact top panel, no fixed height ── */
  .sidebar {
    width: 100%;
    min-width: 0;
    border-right: none;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    /* DO NOT set height/max-height here */
  }

  .logo { display: none; }

  .tab-row { border-bottom: 1px solid var(--border); }
  .tab { padding: 11px 6px; font-size: 0.68rem; }

  /* Pane: natural height, no clipping */
  .sidebar-pane {
    padding: 12px;
    overflow: visible;
    /* no max-height — let content breathe */
  }

  /* Calendar: compact but fully visible */
  .cal-nav { margin-bottom: 10px; }
  .cal-month-lbl { font-size: 0.85rem; }
  .cal-grid { gap: 3px; }
  .cal-day { font-size: 0.72rem; border-radius: 5px; }

  /* Plan list: natural flow */
  #plans-list { margin-bottom: 8px; }

  /* ── Main: normal block flow ── */
  .main {
    flex: none;
    width: 100%;
    overflow: visible;
  }

  /* Topbar: stack title above buttons */
  .topbar {
    flex-direction: column;
    align-items: flex-start;
    gap: 10px;
    padding: 14px;
    position: static; /* no sticky on mobile */
  }

  .topbar-left { width: 100%; }
  .topbar-title { font-size: 1rem; white-space: normal; }
  .topbar-date { font-size: 0.6rem; letter-spacing: 1px; }

  #top-actions {
    width: 100%;
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
  }
  #top-actions .btn {
    flex: 1;
    min-width: 120px;
    justify-content: center;
    font-size: 0.75rem;
    padding: 10px;
  }

  /* Content */
  .content { padding: 14px; }

  /* Progress */
  .prog-bar-wrap {
    flex-direction: column;
    align-items: flex-start;
    gap: 10px;
    padding: 12px 14px;
    margin-bottom: 14px;
  }
  .stats-row { gap: 16px; }
  .prog-track { width: 100%; }
  .prog-pct { text-align: left; }

  /* Exercise cards */
  .ex-top { padding: 12px; gap: 8px; }
  .ex-name-inp { font-size: 0.88rem; min-width: 0; }
  .ex-body { padding: 12px; }

  /* Sets */
  table.sets th { font-size: 0.55rem; padding: 0 3px 6px; }
  table.sets td { padding: 2px; }
  .si { padding: 8px 6px; font-size: 0.82rem; }
  .si.num { width: 26px; }
  .rm-set { padding: 6px 8px; }

  /* Assign panel */
  .assign-panel { padding: 12px; }
  .assign-plans { gap: 6px; }
  .assign-chip { padding: 8px 12px; font-size: 0.78rem; }

  /* Alt */
  .alt-toggle { padding: 10px 12px; }
  .alt-inner { padding: 12px; }

  /* Modals */
  .modal {
    width: calc(100vw - 28px);
    padding: 20px;
    margin: 14px;
  }
  .modal-btns { flex-direction: column-reverse; gap: 8px; }
  .modal-btns .btn { width: 100%; justify-content: center; padding: 12px; }

  /* Plan chips */
  .plan-item { padding: 10px; }
  .plan-item-name { font-size: 0.82rem; }

  /* Buttons in add-ex */
  .add-ex { padding: 14px; }
}
</style>
</head>
<body>
<div class="app">

<!-- ══ SIDEBAR ══════════════════════════ -->
<aside class="sidebar">
  <div class="logo">
    <div class="logo-mark">IronLog</div>
    <div class="logo-sub">WORKOUT TRACKER</div>
  </div>

  <div class="tab-row">
    <div class="tab active" id="tab-plans" onclick="switchTab('plans')">PLANY</div>
    <div class="tab" id="tab-cal" onclick="switchTab('cal')">KALENDARZ</div>
  </div>

  <!-- PLANS TAB -->
  <div class="sidebar-pane active" id="pane-plans">
    <div id="plans-list"></div>
    <button class="new-plan-btn" onclick="openNewPlanModal()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Nowy plan
    </button>
  </div>

  <!-- CALENDAR TAB -->
  <div class="sidebar-pane" id="pane-cal">
    <div class="cal-nav">
      <button class="cal-arr" onclick="calPrev()">&#8249;</button>
      <div class="cal-month-lbl" id="cal-lbl"></div>
      <button class="cal-arr" onclick="calNext()">&#8250;</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>
</aside>

<!-- ══ MAIN ══════════════════════════════ -->
<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-date" id="top-date"></div>
      <div class="topbar-title" id="top-title">Wybierz plan lub dzień</div>
      <div id="top-badge" style="display:none"></div>
    </div>
    <div style="display:flex;gap:8px;" id="top-actions"></div>
  </div>
  <div class="content" id="content"></div>
</div>
</div>

<!-- MODAL: NEW PLAN -->
<div class="overlay" id="modal-new">
  <div class="modal">
    <div class="modal-title">Nowy plan treningowy</div>
    <div class="modal-sub">Nadaj nazwę planowi. Później przypisz go do dowolnych dni w kalendarzu.</div>
    <input class="modal-inp" id="inp-new-plan" placeholder="Np. Push Day, Nogi, Plecy..." maxlength="50"
      onkeydown="if(event.key==='Enter')confirmNewPlan()">
    <div class="modal-btns">
      <button class="btn btn-ghost" onclick="closeModal('modal-new')">Anuluj</button>
      <button class="btn btn-accent" onclick="confirmNewPlan()">Stwórz</button>
    </div>
  </div>
</div>

<!-- MODAL: DELETE CONFIRM -->
<div class="overlay" id="modal-delete">
  <div class="modal">
    <div class="modal-title">Usuń plan</div>
    <div class="modal-sub" id="delete-sub"></div>
    <div class="modal-btns">
      <button class="btn btn-ghost" onclick="closeModal('modal-delete')">Anuluj</button>
      <button class="btn btn-red" onclick="confirmDelete()">Usuń</button>
    </div>
  </div>
</div>

<!-- MODAL: RENAME PLAN -->
<div class="overlay" id="modal-rename">
  <div class="modal">
    <div class="modal-title">Zmień nazwę planu</div>
    <div class="modal-sub" id="rename-sub"></div>
    <input class="modal-inp" id="inp-rename" maxlength="50"
      onkeydown="if(event.key==='Enter')confirmRename()">
    <div class="modal-btns">
      <button class="btn btn-ghost" onclick="closeModal('modal-rename')">Anuluj</button>
      <button class="btn btn-accent" onclick="confirmRename()">Zapisz</button>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════
// STATE
// state.plans = [ { id, name, exercises:[] } ]
// state.calendar = { "2025-03-10": planId | null }
// ════════════════════════════════════════
let state = loadState() || { plans: [], calendar: {} };
let idCounter = state.plans.length ? Math.max(...state.plans.map(p=>p.id))+1 : 1;
let exIdCounter = 1;

// Ensure all exercises have ids
state.plans.forEach(p => p.exercises.forEach(e => {
  if (!e.id) e.id = exIdCounter++;
  else if (e.id >= exIdCounter) exIdCounter = e.id+1;
}));

function saveState() { try { localStorage.setItem('ironlog_v3', JSON.stringify(state)); } catch(e){} }
function loadState() { try { const s=localStorage.getItem('ironlog_v3'); return s?JSON.parse(s):null; } catch(e){return null;} }

// VIEW STATE
let activeTab = 'plans';       // 'plans' | 'cal'
let selectedPlanId = null;     // viewing a plan from library
let selectedCalDate = null;    // viewing a calendar day
let renamingPlanId = null;

const now = new Date();
let calYear = now.getFullYear(), calMonth = now.getMonth();

function todayKey() { return dateKey(now.getFullYear(), now.getMonth(), now.getDate()); }
function dateKey(y,m,d) { return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
function parseDK(k) { const [y,m,d]=k.split('-').map(Number); return new Date(y,m-1,d); }
function fmtDatePL(k) { return parseDK(k).toLocaleDateString('pl-PL',{weekday:'long',day:'numeric',month:'long',year:'numeric'}); }
const MONTHS = ['Styczeń','Luty','Marzec','Kwiecień','Maj','Czerwiec','Lipiec','Sierpień','Wrzesień','Październik','Listopad','Grudzień'];
const DOWS = ['Pn','Wt','Śr','Cz','Pt','So','Nd'];

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── TAB ────────────────────────────────
function switchTab(t) {
  activeTab = t;
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('active'));
  document.getElementById(`tab-${t}`).classList.add('active');
  document.querySelectorAll('.sidebar-pane').forEach(el=>el.classList.remove('active'));
  document.getElementById(`pane-${t}`).classList.add('active');
  if(t==='cal') renderCalendar();
}

// ════════════════════════════════════════
// PLANS LIST (sidebar)
// ════════════════════════════════════════
function renderPlansList() {
  const el = document.getElementById('plans-list');
  if(!state.plans.length) {
    el.innerHTML = `<div style="font-size:0.78rem;color:var(--t3);padding:6px 2px 10px;line-height:1.6">Nie masz jeszcze żadnych planów.<br>Stwórz pierwszy plan poniżej.</div>`;
    return;
  }
  el.innerHTML = state.plans.map(p=>`
    <div class="plan-item ${p.id===selectedPlanId&&!selectedCalDate?'selected':''}" onclick="selectPlan(${p.id})">
      <div class="plan-dot"></div>
      <div class="plan-item-name">${esc(p.name)}</div>
      <div class="plan-item-count">${p.exercises.length}</div>
    </div>`).join('');
}

function selectPlan(id) {
  selectedPlanId = id;
  selectedCalDate = null;
  renderPlansList();
  renderMain();
}

// ════════════════════════════════════════
// CALENDAR
// ════════════════════════════════════════
function renderCalendar() {
  document.getElementById('cal-lbl').textContent = `${MONTHS[calMonth]} ${calYear}`;
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  DOWS.forEach(d=>{ const e=document.createElement('div'); e.className='cal-dow'; e.textContent=d; grid.appendChild(e); });

  const first = new Date(calYear,calMonth,1);
  const startDow = (first.getDay()+6)%7;
  const dim = new Date(calYear,calMonth+1,0).getDate();
  const prevDim = new Date(calYear,calMonth,0).getDate();

  for(let i=startDow-1;i>=0;i--) grid.appendChild(makeDayEl(calYear,calMonth-1,prevDim-i,true));
  for(let d=1;d<=dim;d++) grid.appendChild(makeDayEl(calYear,calMonth,d,false));
  const total = startDow+dim;
  const rem = total%7===0?0:7-(total%7);
  for(let d=1;d<=rem;d++) grid.appendChild(makeDayEl(calYear,calMonth+1,d,true));
}

function makeDayEl(y,m,d,other) {
  const real = new Date(y,m,d);
  const ry=real.getFullYear(), rm=real.getMonth(), rd=real.getDate();
  const key = dateKey(ry,rm,rd);
  const el = document.createElement('div');
  el.className = 'cal-day';
  if(other) el.classList.add('other-month');
  if(key===todayKey()) el.classList.add('today');
  if(key===selectedCalDate) el.classList.add('selected');
  const planId = state.calendar[key];
  if(planId) { el.classList.add('has-plan'); const pips=document.createElement('div'); pips.className='plan-pips'; const pip=document.createElement('div'); pip.className='plan-pip'; pips.appendChild(pip); el.appendChild(pip); }
  const num = document.createElement('span'); num.textContent=d; el.insertBefore(num,el.firstChild);
  el.onclick = ()=>selectCalDay(key);
  return el;
}

function calPrev(){ calMonth--; if(calMonth<0){calMonth=11;calYear--;} renderCalendar(); }
function calNext(){ calMonth++; if(calMonth>11){calMonth=0;calYear++;} renderCalendar(); }

function selectCalDay(key) {
  selectedCalDate = key;
  selectedPlanId = null;
  renderCalendar();
  renderPlansList();
  renderMain();
  // switch to cal pane if not already
  if(activeTab!=='cal') switchTab('cal');
}

// ════════════════════════════════════════
// MAIN RENDER
// ════════════════════════════════════════
function renderMain() {
  const dateEl = document.getElementById('top-date');
  const titleEl = document.getElementById('top-title');
  const badgeEl = document.getElementById('top-badge');
  const actionsEl = document.getElementById('top-actions');
  const content = document.getElementById('content');

  // ── CALENDAR DAY VIEW ──
  if(selectedCalDate) {
    dateEl.textContent = fmtDatePL(selectedCalDate).toUpperCase();
    const assignedId = state.calendar[selectedCalDate];
    const plan = assignedId ? state.plans.find(p=>p.id===assignedId) : null;

    titleEl.textContent = plan ? plan.name : 'Brak planu';
    badgeEl.style.display = 'none';

    actionsEl.innerHTML = '';
    if(plan) {
      actionsEl.innerHTML = `
        <button class="btn btn-red" onclick="unassignDay('${selectedCalDate}')">Odepnij plan</button>
        <button class="btn btn-accent" onclick="addExercise(${plan.id})">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Dodaj ćwiczenie
        </button>`;
    }

    let html = '';

    // Assign panel
    html += `<div class="assign-panel">
      <div class="assign-title">PRZYPISZ PLAN DO TEGO DNIA</div>
      <div class="assign-plans">`;
    if(!state.plans.length) {
      html += `<div class="assign-none">Brak planów — stwórz plan w zakładce "Plany"</div>`;
    } else {
      state.plans.forEach(p=>{
        const isActive = assignedId===p.id;
        html += `<div class="assign-chip ${isActive?'active-chip':''}" onclick="assignDay('${selectedCalDate}',${p.id})">${esc(p.name)}</div>`;
      });
    }
    html += `</div></div>`;

    if(plan) {
      const done = plan.exercises.filter(e=>e.done).length;
      const total = plan.exercises.length;
      const pct = total ? Math.round(done/total*100) : 0;
      html += `<div class="prog-bar-wrap">
        <div class="stats-row">
          <div class="stat"><div class="stat-v">${total}</div><div class="stat-l">ĆWICZEŃ</div></div>
          <div class="stat"><div class="stat-v" style="color:var(--green)">${done}</div><div class="stat-l">GOTOWE</div></div>
        </div>
        <div style="flex:1">
          <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
          <div class="prog-pct">${pct}%</div>
        </div>
      </div>`;
      plan.exercises.forEach((ex,ei)=>{ html+=renderExCard(ex,ei,plan.id,true); });
      html += `<button class="add-ex" onclick="addExercise(${plan.id})">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Dodaj ćwiczenie
      </button>`;
    } else {
      html += `<div class="empty">
        <div class="empty-icon"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg></div>
        <div class="empty-title">Wybierz plan powyżej</div>
        <div class="empty-sub">Przypisz jeden ze swoich planów do tego dnia lub stwórz nowy w zakładce Plany</div>
      </div>`;
    }

    content.innerHTML = html;
    return;
  }

  // ── PLAN LIBRARY VIEW ──
  if(selectedPlanId) {
    const plan = state.plans.find(p=>p.id===selectedPlanId);
    if(!plan) { selectedPlanId=null; renderMain(); return; }
    dateEl.textContent = 'BIBLIOTEKA PLANÓW';
    titleEl.textContent = plan.name;

    // Count how many calendar days use this plan
    const usedDays = Object.values(state.calendar).filter(id=>id===plan.id).length;
    badgeEl.style.display = usedDays ? 'flex' : 'none';
    badgeEl.innerHTML = `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Przypisany do ${usedDays} ${usedDays===1?'dnia':'dni'}`;

    actionsEl.innerHTML = `
      <button class="btn btn-ghost" onclick="openRenameModal(${plan.id})">Zmień nazwę</button>
      <button class="btn btn-red" onclick="deletePlan(${plan.id})">Usuń plan</button>
      <button class="btn btn-accent" onclick="addExercise(${plan.id})">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Dodaj ćwiczenie
      </button>`;

    let html = '';
    plan.exercises.forEach((ex,ei)=>{ html+=renderExCard(ex,ei,plan.id,false); });
    html += `<button class="add-ex" onclick="addExercise(${plan.id})">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Dodaj ćwiczenie
    </button>`;
    content.innerHTML = html;
    return;
  }

  // ── NOTHING SELECTED ──
  dateEl.textContent = '';
  titleEl.textContent = 'Wybierz plan lub dzień';
  badgeEl.style.display = 'none';
  actionsEl.innerHTML = '';
  content.innerHTML = `<div class="empty">
    <div class="empty-icon"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div>
    <div class="empty-title">Witaj w IronLog</div>
    <div class="empty-sub">Stwórz plan w zakładce <strong>Plany</strong>, dodaj ćwiczenia, a potem przypisz go do dni w <strong>Kalendarzu</strong></div>
  </div>`;
}

// ════════════════════════════════════════
// EXERCISE CARD HTML
// ════════════════════════════════════════
function renderExCard(ex, ei, planId, showDone) {
  const setsRows = (ex.sets||[]).map((s,si)=>`
    <tr>
      <td><input class="si num" type="text" value="${si+1}" readonly></td>
      <td><input class="si" type="number" placeholder="—" value="${esc(s.reps)}" min="0"
        oninput="updSet(${planId},${ex.id},${si},'reps',this.value)"></td>
      <td><input class="si" type="number" placeholder="—" value="${esc(s.weight)}" min="0" step="0.5"
        oninput="updSet(${planId},${ex.id},${si},'weight',this.value)"></td>
      <td><button class="rm-set" onclick="rmSet(${planId},${ex.id},${si})">×</button></td>
    </tr>`).join('');

  const alt = ex.alt||{};
  const altSets = (alt.sets||[{reps:'',weight:''}]).map((s,si)=>`
    <tr>
      <td><input class="si num" type="text" value="${si+1}" readonly></td>
      <td><input class="si" type="number" placeholder="—" value="${esc(s.reps)}" min="0"
        oninput="updAltSet(${planId},${ex.id},${si},'reps',this.value)"></td>
      <td><input class="si" type="number" placeholder="—" value="${esc(s.weight)}" min="0" step="0.5"
        oninput="updAltSet(${planId},${ex.id},${si},'weight',this.value)"></td>
      <td><button class="rm-set" onclick="rmAltSet(${planId},${ex.id},${si})">×</button></td>
    </tr>`).join('');

  return `
  <div class="ex-card ${showDone&&ex.done?'done':''}" id="exc-${ex.id}">
    <div class="ex-top">
      ${showDone?`<div class="chk ${ex.done?'on':''}" onclick="toggleDone(${planId},${ex.id})">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="3.5"><polyline points="20 6 9 17 4 12"/></svg>
      </div>`:''}
      <input class="ex-name-inp ${showDone&&ex.done?'strike':''}" type="text"
        placeholder="Nazwa ćwiczenia" value="${esc(ex.name)}"
        oninput="updEx(${planId},${ex.id},'name',this.value)">
      <button class="icon-btn expand ${ex.open?'open':''}" onclick="toggleOpen(${planId},${ex.id})">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <button class="icon-btn del" onclick="rmEx(${planId},${ex.id})">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M9 6V4h6v2"/></svg>
      </button>
    </div>
    <div class="ex-body ${ex.open?'open':''}">
      <div class="sec-lbl">SERIE</div>
      <table class="sets"><thead><tr><th>#</th><th>POWT.</th><th>KG</th><th></th></tr></thead>
        <tbody>${setsRows}</tbody></table>
      <button class="add-set" onclick="addSet(${planId},${ex.id})">+ Dodaj serię</button>

      <div style="margin-top:12px">
        <div class="field-lbl">LINK DO ĆWICZENIA</div>
        <div class="link-wrap">
          <input class="link-inp" type="url" placeholder="https://..." value="${esc(ex.linkMain)}"
            oninput="updEx(${planId},${ex.id},'linkMain',this.value)">
          <button class="link-go" onclick="goLink('${esc(ex.linkMain||'')}')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          </button>
        </div>
      </div>

      <!-- ALT -->
      <div class="alt-box">
        <div class="alt-toggle" onclick="toggleAlt(${planId},${ex.id})">
          <div class="alt-badge">ALT</div>
          <div class="alt-name-lbl">${alt.name ? esc(alt.name) : 'Ćwiczenie alternatywne'}</div>
          <svg class="alt-chv ${ex.altOpen?'open':''}" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div class="alt-inner ${ex.altOpen?'open':''}">
          <div class="field-lbl">NAZWA</div>
          <input class="text-inp" type="text" placeholder="Np. Wiosłowanie sztangą" value="${esc(alt.name)}"
            oninput="updAlt(${planId},${ex.id},'name',this.value)">
          <div class="sec-lbl">SERIE (ALTERNATYWA)</div>
          <table class="sets"><thead><tr><th>#</th><th>POWT.</th><th>KG</th><th></th></tr></thead>
            <tbody>${altSets}</tbody></table>
          <button class="add-set" onclick="addAltSet(${planId},${ex.id})" style="margin-bottom:12px">+ Dodaj serię</button>
          <div class="field-lbl">LINK DO ALTERNATYWY</div>
          <div class="link-wrap">
            <input class="link-inp" type="url" placeholder="https://..." value="${esc(alt.link)}"
              oninput="updAlt(${planId},${ex.id},'link',this.value)">
            <button class="link-go" onclick="goLink('${esc(alt.link||'')}')">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>`;
}

// ════════════════════════════════════════
// MUTATIONS
// ════════════════════════════════════════
function getPlan(pid) { return state.plans.find(p=>p.id===pid); }
function getEx(pid,eid) { return getPlan(pid)?.exercises.find(e=>e.id===eid); }

function toggleDone(pid,eid) { const e=getEx(pid,eid); if(e) e.done=!e.done; saveState(); renderMain(); }
function toggleOpen(pid,eid) { const e=getEx(pid,eid); if(e) e.open=!e.open; saveState(); renderMain(); }
function toggleAlt(pid,eid) { const e=getEx(pid,eid); if(e) e.altOpen=!e.altOpen; saveState(); renderMain(); }
function updEx(pid,eid,f,v) { const e=getEx(pid,eid); if(e) e[f]=v; saveState(); }
function updAlt(pid,eid,f,v) { const e=getEx(pid,eid); if(e){if(!e.alt)e.alt={};e.alt[f]=v;} saveState(); }

function rmEx(pid,eid) {
  const p=getPlan(pid); if(!p)return;
  p.exercises=p.exercises.filter(e=>e.id!==eid);
  saveState(); renderPlansList(); renderMain();
}

function addExercise(pid) {
  const p=getPlan(pid); if(!p)return;
  const ex = { id:exIdCounter++, name:'', done:false, open:true, sets:[{reps:'',weight:''}], linkMain:'', alt:{name:'',sets:[{reps:'',weight:''}],link:''}, altOpen:false };
  p.exercises.push(ex);
  saveState(); renderPlansList(); renderMain();
  setTimeout(()=>{ const ins=document.querySelectorAll('.ex-name-inp'); if(ins.length) ins[ins.length-1].focus(); },40);
}

function updSet(pid,eid,si,f,v) { const e=getEx(pid,eid); if(e?.sets[si]) e.sets[si][f]=v; saveState(); }
function addSet(pid,eid) { const e=getEx(pid,eid); if(e) e.sets.push({reps:'',weight:''}); saveState(); renderMain(); }
function rmSet(pid,eid,si) { const e=getEx(pid,eid); if(e&&e.sets.length>1) e.sets.splice(si,1); saveState(); renderMain(); }

function updAltSet(pid,eid,si,f,v) { const e=getEx(pid,eid); if(e?.alt?.sets?.[si]) e.alt.sets[si][f]=v; saveState(); }
function addAltSet(pid,eid) { const e=getEx(pid,eid); if(e){if(!e.alt)e.alt={};if(!e.alt.sets)e.alt.sets=[];e.alt.sets.push({reps:'',weight:''});} saveState(); renderMain(); }
function rmAltSet(pid,eid,si) { const e=getEx(pid,eid); if(e?.alt?.sets?.length>1) e.alt.sets.splice(si,1); saveState(); renderMain(); }

// ── CALENDAR ASSIGNMENT ──
function assignDay(dateKey, planId) {
  if(state.calendar[dateKey]===planId) {
    delete state.calendar[dateKey]; // toggle off
  } else {
    state.calendar[dateKey] = planId;
  }
  saveState(); renderCalendar(); renderMain();
}

function unassignDay(dateKey) {
  delete state.calendar[dateKey];
  saveState(); renderCalendar(); renderMain();
}

// ── PLAN CRUD ──
function openNewPlanModal() {
  document.getElementById('inp-new-plan').value='';
  document.getElementById('modal-new').classList.add('open');
  setTimeout(()=>document.getElementById('inp-new-plan').focus(),80);
}
function confirmNewPlan() {
  const name = document.getElementById('inp-new-plan').value.trim();
  if(!name) return;
  const plan = { id:idCounter++, name, exercises:[] };
  state.plans.push(plan);
  saveState();
  closeModal('modal-new');
  selectedPlanId = plan.id;
  selectedCalDate = null;
  renderPlansList();
  renderMain();
}

function openRenameModal(pid) {
  renamingPlanId=pid;
  const p=getPlan(pid); if(!p)return;
  document.getElementById('rename-sub').textContent=`Obecna nazwa: "${p.name}"`;
  document.getElementById('inp-rename').value=p.name;
  document.getElementById('modal-rename').classList.add('open');
  setTimeout(()=>document.getElementById('inp-rename').focus(),80);
}
function confirmRename() {
  const name=document.getElementById('inp-rename').value.trim(); if(!name)return;
  const p=getPlan(renamingPlanId); if(p) p.name=name;
  saveState(); closeModal('modal-rename'); renderPlansList(); renderMain();
}

let deletingPlanId = null;
function deletePlan(pid) {
  const p = getPlan(pid); if(!p) return;
  deletingPlanId = pid;
  document.getElementById('delete-sub').textContent = `Czy na pewno chcesz usunąć plan "${p.name}"? Zostanie też odpięty z kalendarza.`;
  document.getElementById('modal-delete').classList.add('open');
}
function confirmDelete() {
  const pid = deletingPlanId; if(!pid) return;
  state.plans = state.plans.filter(p=>p.id!==pid);
  Object.keys(state.calendar).forEach(k=>{ if(state.calendar[k]===pid) delete state.calendar[k]; });
  selectedPlanId = null; deletingPlanId = null;
  saveState(); closeModal('modal-delete'); renderPlansList(); renderCalendar(); renderMain();
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.overlay').forEach(o=>o.addEventListener('click',e=>{ if(e.target===o) o.classList.remove('open'); }));

function goLink(url) { if(url&&(url.startsWith('http://')||url.startsWith('https://'))) window.open(url,'_blank'); }

// ── INIT ──
renderPlansList();
renderMain();
renderCalendar();
</script>
